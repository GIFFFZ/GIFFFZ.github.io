<!DOCTYPE html>
<html>
    <head>
        <title>.</title>
        <link rel="icon" href="./icon-removebg-preview.png">
        <style>
            body {
                margin: 0;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                height: 100vh;
                overflow: hidden;
                background-color: black;
                color: white;
                font-family: sans-serif;
            }

            #animation-image {
                width: 540px;
                height: 480px;
            }

            #animation-image.hidden {
                display: none;
            }

            #loading-indicator {
                font-size: 1.5em;
                text-align: center;
            }
        </style>
    </head>
    <body>

        <div id="loading-indicator">
            <p>Loading frames... (0%)</p>
        </div>

        <img id="animation-image" src="" class="hidden" alt="Animation Frame">

        <script>
            const animationImage = document.getElementById('animation-image');
            const loadingIndicator = document.getElementById('loading-indicator');

            // 1. Corrected frame range for 12 extracted frames (frame0001.jpg to frame0012.jpg)
            const startFrameNumber = 1;
            const endFrameNumber = 12;

            const totalFrames = endFrameNumber - startFrameNumber + 1;
            // 2. Corrected path to look in the current directory (where the frames were uploaded)
            const framesPath = './'; 
            const images = [];
            let imagesLoaded = 0;

            function handleMouseMove(event) {
                const mouseXPercentage = event.clientX / window.innerWidth;
                let frameIndex = Math.floor(mouseXPercentage * totalFrames);

                frameIndex = Math.max(0, Math.min(frameIndex, totalFrames - 1));

                if (images[frameIndex] && animationImage.src !== images[frameIndex].src) {
                    animationImage.src = images[frameIndex].src;
                }
            }

            function preloadImages() {
                const imagesToLoadPaths = [];
                for (let i = 0; i < totalFrames; i++) {
                    const actualFrameNumber = startFrameNumber + i;
                    const paddedFrame = String(actualFrameNumber).padStart(4, '0');
                    // 3. Corrected file extension from .png to .jpg
                    const imagePath = framesPath + 'frame' + paddedFrame + '.jpg'; 
                    imagesToLoadPaths.push(imagePath);
                }

                let nextImageIndex = 0;
                const loadNextChunk = () => {
                    const chunkSize = 50;
                    const chunk = imagesToLoadPaths.slice(nextImageIndex, nextImageIndex + chunkSize);

                    chunk.forEach((imagePath, indexInChunk) => {
                        const img = new Image();
                        images[nextImageIndex + indexInChunk] = img;
                        img.onload = img.onerror = () => {
                            imagesLoaded++;
                            loadingIndicator.querySelector('p').textContent = `Loading frames... (${Math.floor((imagesLoaded / totalFrames) * 100)}%)`;

                            if (imagesLoaded === totalFrames) {
                                console.log('All images processed! Animation ready.');
                                loadingIndicator.style.display = 'none';
                                animationImage.classList.remove('hidden');
                                document.addEventListener('mousemove', handleMouseMove);
                                animationImage.src = images[0].src;
                            }
                        };
                        img.src = imagePath;
                    });

                    nextImageIndex += chunkSize;
                    if (nextImageIndex < totalFrames) {
                        setTimeout(loadNextChunk, 100);
                    }
                };
                loadNextChunk();
            }

            preloadImages();
        </script>
    </body>
</html>
