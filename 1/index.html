<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title> </title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        canvas {
            width: 100vw;
            height: 100vh;
            object-fit: contain;
            image-rendering: pixelated;
            animation: drift 8s ease-in-out infinite;
        }
        @keyframes drift {
            0%   { filter: contrast(1.1) brightness(0.9); transform: scale(1); }
            50%  { filter: contrast(1.1) brightness(0.8); transform: scale(1.005); }
            100% { filter: contrast(1.1) brightness(0.9); transform: scale(1); }
        }
        .paused {
            filter: brightness(0) !important;
        }
        * { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body>

    <video id="v" loop playsinline style="display:none;">
        <source src="output.mp4" type="video/mp4">
    </video>
    <canvas id="c"></canvas>

    <script>
        const v = document.getElementById('v');
        const c = document.getElementById('c');
        const ctx = c.getContext('2d', { alpha: false });
        const scale = 0.4; 
        let isMoving = false;

        v.addEventListener('loadedmetadata', function() {
            v.currentTime = Math.random() * v.duration;
            c.width = v.videoWidth * scale;
            c.height = v.videoHeight * scale;
        });

        function render() {
            if (!v.paused) {
                ctx.drawImage(v, 0, 0, c.width, c.height);
            }
            requestAnimationFrame(render);
        }

        function startMedia() {
            v.muted = false;
            v.play();
            render();
        }

        window.addEventListener('devicemotion', (event) => {
            const acc = event.accelerationIncludingGravity;
            const threshold = 1.5; 
            
            const motion = Math.abs(acc.x) + Math.abs(acc.y) + Math.abs(acc.z);
            
            if (!this.lastMotion) { this.lastMotion = motion; return; }
            
            const delta = Math.abs(motion - this.lastMotion);
            this.lastMotion = motion;

            if (delta > threshold) {
                v.pause();
                c.classList.add('paused');
            } else {
                if (v.paused && v.readyState >= 2) {
                    v.play().catch(()=>{});
                    c.classList.remove('paused');
                }
            }
        });

        document.addEventListener('click', startMedia, { once: true });
        document.addEventListener('touchstart', startMedia, { once: true });

        window.onload = () => {
            v.play().then(() => {
                render();
            }).catch(() => {
            });
        };
    </script>
</body>
</html>
