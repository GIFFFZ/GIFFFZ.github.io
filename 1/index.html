<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title> </title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        canvas {
            width: 100vw;
            height: 100vh;
            object-fit: contain;
            image-rendering: pixelated;
            animation: drift 8s ease-in-out infinite;
        }
        @keyframes drift {
            0%   { filter: contrast(1.1) brightness(0.9); transform: scale(1); }
            50%  { filter: contrast(1.1) brightness(0.8); transform: scale(1.005); }
            100% { filter: contrast(1.1) brightness(0.9); transform: scale(1); }
        }
        canvas.paused {
            filter: brightness(0) !important;
        }
        * { -webkit-tap-highlight-color: transparent; }
        #muteToggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 10;
            width: 50px;
            height: 50px;
            background-color: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            transition: background-color 0.3s;
        }
        #muteToggle:hover {
            background-color: rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body>

    <video id="v" loop playsinline style="display:none;">
        <source src="output.mp4" type="video/mp4">
    </video>
    <canvas id="c"></canvas>
    <button id="muteToggle">🔊</button>

    <script>
        const v = document.getElementById('v');
        const c = document.getElementById('c');
        const muteToggle = document.getElementById('muteToggle');
        const ctx = c.getContext('2d', { alpha: false });
        const scale = 0.4; 
        let lastMotion = 0;

        v.addEventListener('loadedmetadata', function() {
            v.currentTime = Math.random() * v.duration;
            c.width = v.videoWidth * scale;
            c.height = v.videoHeight * scale;
        });

        function render() {
            if (!v.paused) {
                ctx.drawImage(v, 0, 0, c.width, c.height);
            }
            requestAnimationFrame(render);
        }

        function startMedia() {
            v.muted = true; // Start muted for autoplay policy
            v.play().catch(() => {});
            render();
        }

        muteToggle.addEventListener('click', () => {
            v.muted = !v.muted;
            muteToggle.textContent = v.muted ? '🔇' : '🔊';
        });

        window.addEventListener('devicemotion', (event) => {
            const acc = event.accelerationIncludingGravity;
            const threshold = 1.5; 
            
            const motion = Math.abs(acc.x) + Math.abs(acc.y) + Math.abs(acc.z);
            
            if (lastMotion === 0) { 
                lastMotion = motion; 
                return; 
            }
            
            const delta = Math.abs(motion - lastMotion);
            lastMotion = motion;

            if (delta > threshold) {
                v.pause();
                c.classList.add('paused');
            } else {
                if (v.paused && v.readyState >= 2) {
                    v.play().catch(() => {});
                    c.classList.remove('paused');
                }
            }
        });

        document.addEventListener('click', startMedia, { once: true });
        document.addEventListener('touchstart', startMedia, { once: true });

        window.onload = () => {
            v.muted = true;
            v.play().catch(() => {});
            render();
        };
    </script>
</body>
</html>
